<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG TODO CARD</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    
<article data-testid="test-todo-card" class="card">

  <h2 data-testid="test-todo-title">Finish HNG Stage 0 Task</h2>

  <p data-testid="test-todo-description">
    Build a clean and testable todo card component
  </p>

  <span data-testid="test-todo-priority" class="priority high">
    High
  </span>

  <time data-testid="test-todo-due-date" datetime="2026-04-16">
    Due April 16, 2026
  </time>

  <div data-testid="test-todo-time-remaining">
    Due in 2 days
  </div>

  <span data-testid="test-todo-status">Pending</span>

  <label>
  <input type="checkbox" data-testid="test-todo-complete-toggle" aria-label="Mark task as complete"
/>
    Mark as done
  </label>

  <ul data-testid="test-todo-tags" class="tags">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
  </ul>

  <div class="actions">
    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>

</article>



<script src="./script.js"></script>
</body>
</html>
