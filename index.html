<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG TODO CARD</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div class="cardContent">
        <article data-testid="test-todo-card" class="card">

            <h2 data-testid="test-todo-title">Finish HNG Stage 0 Task</h2>


            <button type="button" data-testid="test-todo-expand-toggle" aria-expanded="false">
                Show more
            </button>

           <div id="todo-details" data-testid="test-todo-collapsible-section" class="collapsible">
                <p data-testid="test-todo-description">
                    Build a clean and testable todo card component
                </p>
            </div>

            <div class="priority-parent">
            
            <div data-testid="test-todo-priority-indicator" class="priority-indicator"></div>
             <span data-testid="test-todo-priority" class="priority high">
                High
            </span>
            </div>
            


            <span data-testid="test-todo-status">Pending</span>

            <time data-testid="test-todo-due-date" datetime="2026-04-16">
                Due April 17, 2026
            </time>

           
            <div data-testid="test-todo-overdue-indicator" class="overdue-indicator" style="display: none;">⚠ Overdue
             </div>

            <div data-testid="test-todo-time-remaining" aria-live="polite">
                Due in 2 days
            </div>

            <div data-testid="test-todo-overdue-indicator" class="overdue-indicator" style="display: none;">Overdue
           </div>

             <select data-testid="test-todo-status-control" aria-label="Task status">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>

            <label>
                <input type="checkbox" data-testid="test-todo-complete-toggle" />
                Mark as done
            </label>

            <div class="actions">
                <button data-testid="test-todo-edit-button">Edit</button>
                <button data-testid="test-todo-delete-button">Delete</button>
            </div>

        </article>
    </div>








    <!-- 1a part -->
    <div data-testid="test-todo-edit-form" class="edit-form" style="display:none;">

        <label for="edit-title">
            Title:
            <input type="text" id="title" data-testid="test-todo-edit-title-input">
        </label>

        <label for="edit-description">
            Description:
            <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>
        </label>

        <label for="edit-priority">
            Priority:
            <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </label>

        <label for="edit-status">
            Status:
            <select id="edit-status" data-testid="test-todo-edit-status-select">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </label>

        <label for="edit-date">
            Due Date:
            <input id="edit-date" type="date" data-testid="test-todo-edit-due-date-input">
        </label>

        <div class="actions">
            <button data-testid="test-todo-save-button">Save</button>
            <button data-testid="test-todo-cancel-button">Cancel</button>
        </div>

    </div>



    <script src="./script.js"></script>
</body>

</html>
